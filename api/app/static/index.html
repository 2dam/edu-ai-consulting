<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 입시 컨설팅</title>
<style>
  body { font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; color: #222; }
  h1 { font-size: 1.4rem; }
  label { display: block; margin-top: 16px; font-weight: 600; }
  input, select { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; font-size: 1rem; }
  button { margin-top: 24px; padding: 10px 20px; font-size: 1rem; cursor: pointer; background: #2952cc; color: white; border: none; border-radius: 6px; }
  button:disabled { background: #aaa; cursor: default; }
  #result { margin-top: 32px; white-space: pre-wrap; line-height: 1.6; background: #f7f7f9; padding: 16px; border-radius: 6px; display: none; }
  #error { margin-top: 16px; color: #c0392b; display: none; }
</style>
</head>
<body>
  <h1>AI 빅데이터 입시 컨설팅</h1>
  <p>학생 정보를 입력하면 AI가 맞춤 입시 컨설팅 리포트를 생성합니다.</p>

  <form id="report-form">
    <label>학생 식별 라벨 (이름 대신 사용, 비식별)
      <input type="text" id="student_label" required placeholder="예: stu-001">
    </label>
    <label>희망 티어
      <select id="tier">
        <option value="BASIC">BASIC</option>
        <option value="STANDARD" selected>STANDARD</option>
        <option value="PREMIUM">PREMIUM</option>
      </select>
    </label>
    <label>성적대 (예: 내신 2등급)
      <input type="text" id="grade" required>
    </label>
    <label>지망 학과
      <input type="text" id="major" required>
    </label>
    <label>관심 지역
      <input type="text" id="region">
    </label>
    <button type="submit" id="submit-btn">리포트 생성</button>
  </form>

  <div id="error"></div>
  <div id="result"></div>

  <script>
    const form = document.getElementById('report-form');
    const btn = document.getElementById('submit-btn');
    const result = document.getElementById('result');
    const error = document.getElementById('error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      error.style.display = 'none';
      result.style.display = 'none';
      btn.disabled = true;
      btn.textContent = '생성 중... (최대 30초)';

      const payload = {
        student_label: document.getElementById('student_label').value,
        tier: document.getElementById('tier').value,
        profile: {
          "성적대": document.getElementById('grade').value,
          "지망학과": document.getElementById('major').value,
          "지역": document.getElementById('region').value
        }
      };

      try {
        const res = await fetch('/reports', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `요청 실패 (${res.status})`);
        }
        const data = await res.json();
        result.textContent = data.report_text;
        result.style.display = 'block';
      } catch (err) {
        error.textContent = '오류: ' + err.message;
        error.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = '리포트 생성';
      }
    });
  </script>
</body>
</html>
