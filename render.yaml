services:
  - type: web
    name: edu-ai-consulting-api
    runtime: python
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    # 크롤링으로 쌓은 데이터가 재배포/재시작 후에도 남아있도록 영구 디스크에 저장한다.
    # 디스크가 없으면 컨테이너 재시작 시 SQLite 파일이 초기화된다.
    disk:
      name: edu-ai-consulting-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:////var/data/edu_consulting.db

  # OSINT/EduIntel Next.js 대시보드 (app.ichapterwise.com).
  - type: web
    name: edu-ai-consulting-dashboard
    runtime: node
    rootDir: dashboard
    buildCommand: npm install && npm run build
    startCommand: npx next start -p $PORT
    envVars:
      - key: BACKEND_URL
        value: https://ichapterwise.com
      - key: NEXT_PUBLIC_BACKEND_URL
        value: https://ichapterwise.com

  # AI 교육뉴스 커뮤니티·맘카페 프론트엔드 (Vite+React 정적 빌드).
  # 기존 dashboard/(OSINT용 Next.js 대시보드, app.ichapterwise.com)와는 별개 서비스.
  - type: web
    name: edu-ai-consulting-community
    runtime: static
    rootDir: dashboard-community
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://ichapterwise.com
    routes:
      # React Router의 클라이언트 사이드 라우팅을 위해 모든 경로를 index.html로 폴백.
      - type: rewrite
        source: /*
        destination: /index.html
